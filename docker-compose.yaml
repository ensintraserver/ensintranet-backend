version: "3.7"

services:
  ens-backend:
    build:
      context: .
      dockerfile: Dockerfile
    # volumes:
    #   - ./src:/myfolder/src
    ports:
      - 3001:3001

  ens-database:
    image: postgres:15-alpine # mysql → postgres:15-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - 15432:5432 # 3306 → 5432

  ens-redis:
    image: redis:latest
    ports:
      - 6379:6379
