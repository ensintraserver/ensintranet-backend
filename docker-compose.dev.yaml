version: "3.7"

services:
  ens-backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - ./src:/myfolder/src
    ports:
      - "3001:3001"
    env_file:
      - ./.env
    environment:
      - NODE_ENV=development
    depends_on:
      - ens-database

  ens-database:
    image: postgres:15-alpine
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
